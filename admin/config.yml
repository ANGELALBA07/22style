backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "es"

collections:
  - name: "site"
    label: "🏠 Textos generales del sitio"
    files:
      - file: "data/site.json"
        label: "Banner principal, WhatsApp y redes"
        name: "site_settings"
        fields:
          - {label: "Logo de la tienda (imagen)", name: "logoUrl", widget: "image", required: false, hint: "Sube tu logo real. Si lo dejas vacío, se muestra el logo de texto por defecto."}
          - {label: "Texto de la barra superior", name: "topbar", widget: "string"}
          - {label: "Frase pequeña sobre el título (hero)", name: "heroEyebrow", widget: "string"}
          - {label: "Título — parte 1", name: "heroTitleBefore", widget: "string"}
          - {label: "Título — palabra destacada", name: "heroTitleEm", widget: "string"}
          - {label: "Título — parte 2", name: "heroTitleAfter", widget: "string"}
          - {label: "Texto debajo del título", name: "heroLead", widget: "text"}
          - {label: "Número de WhatsApp (sin +, ej. 51900000000)", name: "whatsappNumber", widget: "string"}
          - {label: "Mensaje predeterminado de WhatsApp", name: "whatsappMessage", widget: "string"}
          - {label: "Link de TikTok", name: "tiktokUrl", widget: "string"}

  - name: "products"
    label: "🛍️ Productos"
    files:
      - file: "data/products.json"
        label: "Productos de la tienda"
        name: "catalogo"
        fields:
          - label: "Productos"
            name: "products"
            widget: "list"
            collapsed: false
            summary: "{{fields.code}} · {{fields.name}} — S/. {{fields.price}}"
            fields:
              - {label: "Código (ej. BC-001)", name: "code", widget: "string", required: false}
              - {label: "Nombre del producto", name: "name", widget: "string"}
              - {label: "Precio actual (S/.)", name: "price", widget: "number", value_type: "float"}
              - {label: "Precio anterior tachado (S/.)", name: "old", widget: "number", value_type: "float", required: false}
              - {label: "Texto del sello (ej. NUEVO, -30%)", name: "badge", widget: "string", required: false}
              - {label: "Etiqueta pequeña", name: "tag", widget: "string", required: false}
              - {label: "Descripción corta", name: "desc", widget: "text", required: false}
              - label: "Colores y fotos"
                name: "colors"
                widget: "list"
                collapsed: false
                summary: "{{fields.name}}"
                hint: "Cada color tiene su propia foto principal y tallas con stock."
                fields:
                  - {label: "Nombre del color", name: "name", widget: "string"}
                  - {label: "Color (paleta visual)", name: "hex", widget: "color", enableAlpha: false}
                  - {label: "Foto principal de este color", name: "image", widget: "image", media_library: {config: {multiple: false}}, hint: "Esta es la foto que se ve primero al elegir este color."}
                  - label: "Fotos adicionales de este color (opcional)"
                    name: "gallery"
                    widget: "list"
                    required: false
                    collapsed: true
                    field: {label: "Foto", name: "src", widget: "image"}
                  - label: "Tallas y stock"
                    name: "sizes"
                    widget: "list"
                    collapsed: false
                    summary: "{{fields.label}}: {{fields.stock}} en stock"
                    fields:
                      - {label: "Talla", name: "label", widget: "select", options: ["XS","S","M","L","XL","XXL"]}
                      - {label: "Stock disponible", name: "stock", widget: "number", value_type: "int", min: 0}
              - {label: "ID interno (único, no lo cambies)", name: "id", widget: "string"}

  - name: "testimonials"
    label: "💬 Testimonios"
    files:
      - file: "data/testimonials.json"
        label: "Opiniones de clientas"
        name: "testimonios"
        fields:
          - label: "Testimonios"
            name: "testimonials"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - {label: "Nombre de la clienta", name: "name", widget: "string"}
              - {label: "Comentario", name: "text", widget: "text"}

  - name: "faq"
    label: "❓ Preguntas frecuentes"
    files:
      - file: "data/faq.json"
        label: "Preguntas y respuestas"
        name: "preguntas"
        fields:
          - label: "Preguntas"
            name: "faqs"
            widget: "list"
            summary: "{{fields.q}}"
            fields:
              - {label: "Pregunta", name: "q", widget: "string"}
              - {label: "Respuesta", name: "a", widget: "text"}
